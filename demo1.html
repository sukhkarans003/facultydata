<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Management System - Final Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db; 
            --accent-dark: #0056b3;
            --success: #27ae60;
            --danger: #c0392b;
            --info: #2980b9; /* Blue for Half Day */
            --warning: #f39c12; /* Orange for Medical */
            --light: #ecf0f1;
            --dark: #2c3e50;
            --text-grey: #7f8c8d;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #f4f7f6; color: #333; height: 100vh; display: flex; flex-direction: column; }

        /* --- Navigation --- */
        nav { background-color: var(--primary); color: white; padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); z-index: 1000; }
        .logo { font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .college-display { font-size: 0.9rem; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px; margin-right: 15px; }
        .nav-links button { background: none; border: none; color: white; cursor: pointer; margin-left: 15px; font-size: 0.95rem; }
        .nav-links button:hover { color: var(--accent); }

        /* --- Auth View --- */
        #auth-view { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); position: absolute; top: 0; left: 0; z-index: 2000; }
        .auth-box { background: white; padding: 2rem; border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 400px; max-width: 90%; text-align: center; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-grey); font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-info { background: var(--info); color: white; } /* Half Day */
        .btn-warning { background: var(--warning); color: white; } /* Medical */
        .btn-sm { padding: 5px 10px; font-size: 0.85rem; margin: 0; width: auto; }
        .forgot-pass { color: var(--accent); cursor: pointer; font-size: 0.8rem; text-align: right; display: block; margin-top: 5px; }

        /* --- Dashboard Layout --- */
        #dashboard-view { display: none; width: 100%; height: 100%; flex-direction: column; }
        .d-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .user-profile { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .user-avatar { 
            width: 80px; height: 80px; border-radius: 50%; background: var(--light); 
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; color: var(--secondary); overflow: hidden; border: 3px solid #ddd;
            background-size: cover; background-position: center;
        }
        .menu-item { padding: 15px 20px; cursor: pointer; color: var(--text-grey); display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #f0f4f8; color: var(--accent); border-left: 4px solid var(--accent); }

        /* Main Content */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; background: #f4f7f6; position: relative; }
        
        /* --- 1. NOTICE BOARD (Dashboard) --- */
        .notice-board-section { margin-bottom: 30px; }
        .notice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* 6 Columns Grid as requested */
        .notice-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
        }
        /* Responsive fallback for smaller screens */
        @media (max-width: 1400px) { .notice-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1000px) { .notice-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .notice-grid { grid-template-columns: 1fr; } }

        .notice-card {
            background: white; padding: 15px; border-radius: var(--radius); box-shadow: var(--shadow);
            border-top: 5px solid var(--accent); min-height: 180px; display: flex; flex-direction: column;
            position: relative; transition: transform 0.2s;
        }
        .notice-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .notice-date { font-size: 0.75rem; color: var(--text-grey); margin-bottom: 5px; font-weight: bold; }
        .notice-title { font-size: 1rem; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .notice-body { font-size: 0.9rem; color: #555; flex-grow: 1; white-space: pre-wrap; overflow-y: auto; max-height: 100px; }
        .notice-author { margin-top: 10px; font-size: 0.8rem; text-align: right; color: var(--accent); font-style: italic; }

        /* --- 2. ATTENDANCE SECTION --- */
        .attendance-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .attendance-left { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .attendance-right { flex: 2; min-width: 400px; background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }

        .camera-box {
            width: 100%; height: 300px; background: #000; border-radius: 4px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        video, #preview-img { width: 100%; height: 100%; object-fit: cover; }
        #preview-img { display: none; }
        
        .attendance-controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .status-btn { padding: 15px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .status-btn.present { background-color: var(--success); }
        .status-btn.absent { background-color: var(--danger); }
        .status-btn.halfday { background-color: var(--info); }
        .status-btn.medical { background-color: var(--warning); }
        .status-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .status-btn.selected { border: 3px solid #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* Calendar */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-name { font-weight: bold; padding: 10px; background: #eee; border-radius: 4px; }
        .cal-day {
            padding: 15px 5px; background: #fff; border: 1px solid #eee; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; height: 60px; font-size: 0.9rem;
        }
        .cal-day:hover { background: #f9f9f9; }
        /* Calendar Colors */
        .bg-present { background-color: var(--success) !important; color: white; }
        .bg-absent { background-color: var(--danger) !important; color: white; }
        .bg-halfday { background-color: var(--info) !important; color: white; }
        .bg-medical { background-color: var(--warning) !important; color: white; }

        /* --- 3. TIMETABLE --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; } 
        th, td { padding: 12px; text-align: center; border: 1px solid #ddd; font-size: 0.9rem; }
        th { background: var(--primary); color: white; font-weight: 600; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #eef2f5; }

        /* --- 4. MESSAGES --- */
        .msg-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .msg-tab { padding: 8px 20px; cursor: pointer; background: #eee; border-radius: 20px 20px 0 0; font-weight: 600; }
        .msg-tab.active { background: var(--accent); color: white; }
        
        .msg-layout-split { display: flex; gap: 20px; }
        .msg-compose-mini { flex: 0 0 300px; background: white; padding: 15px; border-radius: var(--radius); box-shadow: var(--shadow); height: fit-content; }
        .msg-list-area { flex: 1; }
        
        .msg-item { background: white; padding: 15px; border-radius: var(--radius); border: 1px solid #eee; margin-bottom: 10px; }
        .msg-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #777; margin-bottom: 5px; }
        .msg-sub { font-weight: bold; color: var(--dark); margin-bottom: 5px; }
        .msg-body-txt { font-size: 0.9rem; color: #555; white-space: pre-wrap; }

        /* --- 5. COURSES --- */
        .course-header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-bar { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 250px; }
        
        /* Status Button in Table */
        .status-saved { background-color: var(--success); color: white; padding: 5px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background-color: #95a5a6; color: white; padding: 5px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }

        /* --- 6. PROFILE --- */
        .profile-view-mode input[readonly] { background: #f9f9f9; border: none; color: #555; padding-left: 0; margin-bottom: 10px; width: 100%; font-weight: 600; }
        .profile-edit-mode { display: none; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 25px; border-radius: var(--radius); width: 500px; max-width: 90%; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 4000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast">Notification</div>

    <!-- Navigation -->
    <nav>
        <div class="logo"><i class="fas fa-university"></i> FMS</div>
        <div class="nav-links" id="nav-actions"></div>
    </nav>

    <!-- Auth View -->
    <div id="auth-view">
        <div class="auth-box">
            <h2>Portal Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Select Role</label>
                    <select id="login-role" onchange="updateLoginPlaceholder()">
                        <option value="employee">Employee</option>
                        <option value="hod">HOD</option>
                        <option value="oa">Office Admin</option>
                        <option value="lab_instructor">Lab Instructor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="login-user" required placeholder="Enter ID">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <div style="margin-top: 20px; font-size: 0.8rem; color: #666; background: #f9f9f9; padding: 10px; border-radius: 4px;">
                <b>Demo IDs:</b><br>
                Employee: emp1 (pass: 123)<br>
                HOD: hod1 (pass: 123)<br>
                OA: oa1 (pass: 123)<br>
                Lab Inst: lab1 (pass: 123)
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view">
        <div class="d-container">
            <aside class="sidebar" id="sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="sidebar-avatar"><i class="fas fa-user"></i></div>
                    <h3 id="user-name-display">User</h3>
                    <p id="user-role-display" style="color: var(--accent); font-size: 0.9rem; font-weight: bold;">Role</p>
                </div>
                <div id="menu-container"></div>
            </aside>

            <main class="main-content">
                <div id="content-area"></div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <!-- Add/Edit Course Modal -->
    <div id="course-modal" class="modal">
        <div class="modal-content">
            <h3 id="course-modal-title">Add New Course</h3>
            <input type="hidden" id="course-id">
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="course-subject">
            </div>
            <div class="form-group">
                <label>Syllabus</label>
                <textarea id="course-syllabus" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>PDF Syllabus</label>
                <input type="file" id="course-pdf" accept=".pdf">
                <small id="current-pdf-name" style="color:var(--accent); display:none; display:block;"></small>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeModal('course-modal')">Cancel</button>
                <button class="btn btn-success" onclick="saveCourse()">Save Course</button>
            </div>
        </div>
    </div>

    <script>
        /* ================= STATE & DATA ================= */
        const generateUsers = () => {
            let users = [];
            users.push({ id: 100, name: "Dr. HOD Karan", username: "hod", password: "123", role: "hod", college: "Chandigarh University", dept: "Engineering", uid: "HOD01", photo: "" });
            users.push({ id: 200, name: "OA Preet", username: "oa", password: "123", role: "oa", college: "Chandigarh University", dept: "Office", uid: "OA01", photo: "" });
            users.push({ id: 300, name: "Lab Instr. Rohan", username: "lab1", password: "123", role: "lab_instructor", college: "Chandigarh University", dept: "CS Lab", uid: "LAB01", photo: "" });
            users.push({ id: 1, name: "Employee 1", username: "emp1", password: "123", role: "employee", college: "Chandigarh University", dept: "Computer Science", uid: "EMP001", photo: "" });
            return users;
        };

        const initialNotices = [
            { id: 1, title: "Holiday on Monday", content: "College will remain closed on account of National Holiday.", date: "2023-10-25", author: "OA Preet" },
            { id: 2, title: "Sem Exams", content: "Final semester exams start from next week. Check date sheet.", date: "2023-10-26", author: "Dr. HOD Karan" },
            { id: 3, title: "Meeting", content: "Faculty meeting at 10 AM in Room 302.", date: "2023-10-27", author: "Dr. HOD Karan" }
        ];

        let state = {
            users: generateUsers(),
            currentUser: null,
            notices: JSON.parse(localStorage.getItem('fms_notices')) || initialNotices,
            attendance: JSON.parse(localStorage.getItem('fms_attendance')) || [],
            courses: JSON.parse(localStorage.getItem('fms_courses')) || [],
            messages: JSON.parse(localStorage.getItem('fms_messages')) || [],
            timetable: JSON.parse(localStorage.getItem('fms_timetable')) || []
        };

        function saveState() {
            localStorage.setItem('fms_notices', JSON.stringify(state.notices));
            localStorage.setItem('fms_attendance', JSON.stringify(state.attendance));
            localStorage.setItem('fms_courses', JSON.stringify(state.courses));
            localStorage.setItem('fms_messages', JSON.stringify(state.messages));
            localStorage.setItem('fms_timetable', JSON.stringify(state.timetable));
            localStorage.setItem('fms_users', JSON.stringify(state.users));
        }

        /* ================= AUTH ================= */
        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const role = document.getElementById('login-role').value;
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const account = state.users.find(u => u.username === user && u.password === pass && u.role === role);
            if(account) login(account);
            else showToast("Invalid credentials!");
        });

        function login(user) {
            state.currentUser = user;
            authView.style.display = 'none';
            dashboardView.style.display = 'flex';
            document.getElementById('nav-actions').innerHTML = `<span class="college-display"><i class="fas fa-building"></i> ${user.college}</span><button onclick="logout()">Logout <i class="fas fa-sign-out-alt"></i></button>`;
            document.getElementById('user-name-display').innerText = user.name;
            document.getElementById('user-role-display').innerText = user.role.toUpperCase();
            
            // Setup Sidebar
            let menuItems = [
                { id: 'dashboard', icon: 'fa-tachometer-alt', label: 'Dashboard' },
                { id: 'attendance', icon: 'fa-calendar-check', label: 'Mark Attendance' },
                { id: 'timetable', icon: 'fa-calendar-alt', label: 'Timetable' },
                { id: 'messages', icon: 'fa-envelope', label: 'Messages' },
                { id: 'courses', icon: 'fa-book', label: 'Courses' },
                { id: 'profile', icon: 'fa-id-card', label: 'My Profile' }
            ];
            document.getElementById('menu-container').innerHTML = menuItems.map(item => `<div class="menu-item" onclick="loadSection('${item.id}', this)"><i class="fas ${item.icon}"></i> ${item.label}</div>`).join('');
            document.querySelector('.menu-item').classList.add('active');
            
            loadSection('dashboard');
            showToast(`Welcome, ${user.name}`);
        }

        function logout() { location.reload(); }

        function loadSection(sectionId, el) {
            if(el) { document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
            switch(sectionId) {
                case 'dashboard': renderDashboard(); break;
                case 'attendance': renderAttendance(); break;
                case 'timetable': renderTimetable(); break;
                case 'messages': renderMessages(); break;
                case 'courses': renderCourses(); break;
                case 'profile': renderProfile(); break;
            }
        }

        /* ================= 1. DASHBOARD (Notice Board) ================= */
        function renderDashboard() {
            const user = state.currentUser;
            const isAuthorized = (user.role === 'hod' || user.role === 'oa');
            
            // Sort notices new first
            const sortedNotices = [...state.notices].sort((a,b) => new Date(b.date) - new Date(a.date));

            let addBtnHtml = '';
            if(isAuthorized) {
                addBtnHtml = `
                    <div style="display:flex; gap:10px; margin-bottom: 20px;">
                        <input type="text" id="new-notice-title" placeholder="Notice Title" class="form-group" style="margin:0; flex:1; padding:10px; border:1px solid #ddd; border-radius:4px;">
                        <textarea id="new-notice-content" placeholder="Write full notice here..." style="flex:2; padding:10px; border:1px solid #ddd; border-radius:4px; resize:none;"></textarea>
                        <button class="btn btn-primary" onclick="postNotice()" style="height:100%;">Post</button>
                    </div>
                `;
            } else {
                addBtnHtml = `<div style="text-align:center; padding:20px; color:#888; font-style:italic;">Notice Board managed by Administration</div>`;
            }

            const noticeCards = sortedNotices.map(n => `
                <div class="notice-card">
                    <div class="notice-date"><i class="far fa-clock"></i> ${n.date}</div>
                    <div class="notice-title">${n.title}</div>
                    <div class="notice-body">${n.content}</div>
                    <div class="notice-author">- ${n.author}</div>
                </div>
            `).join('');

            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">Dashboard / Notice Board</h2>
                ${addBtnHtml}
                <div class="notice-grid">
                    ${noticeCards.length ? noticeCards : '<div style="grid-column: 1/-1; text-align:center; padding:20px;">No notices yet.</div>'}
                </div>
            `;
        }

        function postNotice() {
            const title = document.getElementById('new-notice-title').value;
            const content = document.getElementById('new-notice-content').value;
            if(!title || !content) return showToast("Please fill all fields");

            state.notices.push({
                id: Date.now(),
                title: title,
                content: content,
                date: new Date().toISOString().split('T')[0],
                author: state.currentUser.name
            });
            saveState();
            showToast("Notice Posted!");
            renderDashboard();
        }

        /* ================= 2. ATTENDANCE (Selfie & Calendar) ================= */
        let currentStream = null;
        let selectedStatus = null;
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        function renderAttendance() {
            const user = state.currentUser;
            
            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">Mark Attendance</h2>
                <div class="attendance-container">
                    <!-- Left: Camera & Status -->
                    <div class="attendance-left">
                        <div class="camera-box">
                            <video id="camera-feed" autoplay playsinline></video>
                            <canvas id="camera-canvas" style="display:none;"></canvas>
                            <img id="preview-img" src="" alt="Selfie Preview">
                        </div>
                        <div style="text-align:center; margin-bottom:15px;">
                            <button class="btn btn-primary" onclick="startCamera()"><i class="fas fa-camera"></i> Start Camera</button>
                            <button class="btn btn-secondary" style="background:#7f8c8d; color:white; border:none;" onclick="takeSnapshot()"><i class="fas fa-images"></i> Capture</button>
                        </div>
                        <div class="attendance-controls">
                            <button class="status-btn present" onclick="selectStatus('present', this)">Present</button>
                            <button class="status-btn absent" onclick="selectStatus('absent', this)">Absent</button>
                            <button class="status-btn halfday" onclick="selectStatus('halfday', this)">Half Day</button>
                            <button class="status-btn medical" onclick="selectStatus('medical', this)">Medical Leave</button>
                        </div>
                        <div style="margin-top:15px; text-align:center;">
                            <button class="btn btn-success" style="width:100%;" onclick="submitAttendance()">Submit Attendance</button>
                        </div>
                    </div>

                    <!-- Right: Calendar -->
                    <div class="attendance-right">
                        <div class="calendar-header">
                            <button class="btn btn-sm" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                            <h3 id="cal-month-name">Month Year</h3>
                            <button class="btn btn-sm" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-grid">
                            <div class="cal-day-name">Sun</div><div class="cal-day-name">Mon</div><div class="cal-day-name">Tue</div>
                            <div class="cal-day-name">Wed</div><div class="cal-day-name">Thu</div><div class="cal-day-name">Fri</div><div class="cal-day-name">Sat</div>
                        </div>
                        <div id="cal-days" class="calendar-grid"></div>
                        <div style="margin-top:20px; font-size:0.8rem; display:flex; gap:10px; flex-wrap:wrap;">
                            <span style="color:var(--success)">■ Present</span>
                            <span style="color:var(--danger)">■ Absent</span>
                            <span style="color:var(--info)">■ Half Day</span>
                            <span style="color:var(--warning)">■ Medical</span>
                        </div>
                    </div>
                </div>
            `;
            renderCalendarGrid();
        }

        async function startCamera() {
            const video = document.getElementById('camera-feed');
            const img = document.getElementById('preview-img');
            try {
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = currentStream;
                video.style.display = 'block';
                img.style.display = 'none';
            } catch(err) {
                showToast("Camera access denied or unavailable.");
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('camera-canvas');
            const img = document.getElementById('preview-img');
            if(video.style.display === 'none') return showToast("Start camera first");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            img.src = canvas.toDataURL('image/jpeg');
            img.style.display = 'block';
            video.style.display = 'none';
            if(currentStream) currentStream.getTracks().forEach(track => track.stop());
        }

        function selectStatus(status, btn) {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function submitAttendance() {
            const img = document.getElementById('preview-img').src;
            if(!selectedStatus) return showToast("Please select a status button.");
            if(img === "" || document.getElementById('camera-feed').style.display !== 'none') return showToast("Please take a selfie first.");

            const todayStr = new Date().toISOString().split('T')[0];
            
            // Check if already marked
            const existing = state.attendance.find(a => a.userId === state.currentUser.id && a.date === todayStr);
            if(existing) {
                if(!confirm("Attendance already marked for today. Overwrite?")) return;
                existing.status = selectedStatus;
                existing.image = img;
            } else {
                state.attendance.push({
                    id: Date.now(),
                    userId: state.currentUser.id,
                    date: todayStr,
                    status: selectedStatus,
                    image: img
                });
            }
            saveState();
            showToast("Attendance Marked Successfully!");
            renderAttendance(); // Refresh calendar
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendarGrid();
        }

        function renderCalendarGrid() {
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('cal-month-name').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const container = document.getElementById('cal-days');
            container.innerHTML = '';

            // Empty slots for previous month
            for(let i=0; i<firstDay; i++) {
                container.innerHTML += `<div></div>`;
            }

            // Days
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const record = state.attendance.find(a => a.userId === state.currentUser.id && a.date === dateStr);
                let className = 'cal-day';
                if(record) {
                    if(record.status === 'present') className += ' bg-present';
                    else if(record.status === 'absent') className += ' bg-absent';
                    else if(record.status === 'halfday') className += ' bg-halfday';
                    else if(record.status === 'medical') className += ' bg-medical';
                }
                container.innerHTML += `<div class="${className}">${d}</div>`;
            }
        }

        /* ================= 3. TIMETABLE (Detailed Table) ================= */
        function renderTimetable() {
            const user = state.currentUser;
            // Mocking specific timetable data with code, room, block if empty
            if(state.timetable.length === 0) {
                state.timetable = [
                    { userId: 1, day: "Monday", time: "09:00 AM", subject: "Data Structures", code: "CS201", room: "101", block: "A" },
                    { userId: 1, day: "Monday", time: "11:00 AM", subject: "Algorithms", code: "CS202", room: "Lab 1", block: "B" },
                    { userId: 100, day: "Tuesday", time: "10:00 AM", subject: "HOD Meeting", code: "ADM01", room: "Conf Hall", block: "Admin" }
                ];
                saveState();
            }

            const myTimetable = state.timetable.filter(t => t.userId === user.id);
            const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
            const slots = ["09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "02:00 PM", "03:00 PM", "04:00 PM"];

            let rows = "";
            days.forEach(day => {
                rows += `<tr><td style="font-weight:bold; background:#eef2f5;">${day}</td>`;
                slots.forEach(slot => {
                    const entry = myTimetable.find(t => t.day === day && t.time === slot);
                    if(entry) {
                        rows += `
                            <td>
                                <strong>${entry.subject}</strong><br>
                                <span style="color:#666; font-size:0.85rem;">${entry.code}</span><br>
                                <div style="margin-top:4px; font-size:0.8rem; background:#eee; display:inline-block; padding:2px 6px; border-radius:4px;">
                                    ${entry.room} (${entry.block})
                                </div>
                            </td>`;
                    } else {
                        rows += `<td style="color:#ccc;">-</td>`;
                    }
                });
                rows += `</tr>`;
            });

            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">My Timetable</h2>
                <div class="card table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Day / Time</th>
                                ${slots.map(s => `<th>${s}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        /* ================= 4. MESSAGES (Inbox/Sent Split) ================= */
        let currentMsgTab = 'inbox';

        function renderMessages() {
            const user = state.currentUser;
            
            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">Messages</h2>
                <div class="msg-layout-split">
                    <!-- Compose Mini -->
                    <div class="msg-compose-mini">
                        <h3 style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">Compose</h3>
                        <div class="form-group"><label>To</label>
                            <select id="msg-to-select">
                                ${state.users.filter(u=>u.id!==user.id).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Subject</label><input type="text" id="msg-subject-inp"></div>
                        <div class="form-group"><label>Message</label><textarea id="msg-body-inp" rows="4"></textarea></div>
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>

                    <!-- List Area -->
                    <div class="msg-list-area">
                        <div class="msg-tabs">
                            <div class="msg-tab ${currentMsgTab === 'inbox' ? 'active' : ''}" onclick="switchMsgTab('inbox')">Inbox</div>
                            <div class="msg-tab ${currentMsgTab === 'sent' ? 'active' : ''}" onclick="switchMsgTab('sent')">Sent</div>
                        </div>
                        <div id="msg-list-container"></div>
                    </div>
                </div>
            `;
            renderMsgList();
        }

        function switchMsgTab(tab) {
            currentMsgTab = tab;
            renderMessages(); // Re-render to update UI
        }

        function renderMsgList() {
            const user = state.currentUser;
            let filtered = [];
            if(currentMsgTab === 'inbox') filtered = state.messages.filter(m => m.toId === user.id);
            else filtered = state.messages.filter(m => m.fromId === user.id);

            const container = document.getElementById('msg-list-container');
            if(filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#999; margin-top:50px;">No messages in ${currentMsgTab}</div>`;
                return;
            }

            container.innerHTML = filtered.map(m => {
                const other = state.users.find(u => u.id === (currentMsgTab === 'inbox' ? m.fromId : m.toId));
                const name = other ? other.name : 'Unknown';
                return `
                    <div class="msg-item">
                        <div class="msg-meta">
                            <span><strong>${currentMsgTab === 'inbox' ? 'From: ' : 'To: '}${name}</strong></span>
                            <span>${new Date(m.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="msg-sub">${m.subject}</div>
                        <div class="msg-body-txt">${m.content}</div>
                    </div>
                `;
            }).join('');
        }

        function sendMessage() {
            const toId = parseInt(document.getElementById('msg-to-select').value);
            const subject = document.getElementById('msg-subject-inp').value;
            const content = document.getElementById('msg-body-inp').value;
            
            if(!subject || !content) return showToast("Fill subject and message");

            state.messages.push({
                id: Date.now(), fromId: state.currentUser.id, toId: toId, subject: subject, content: content, timestamp: new Date().toISOString()
            });
            saveState();
            showToast("Message Sent!");
            document.getElementById('msg-subject-inp').value = '';
            document.getElementById('msg-body-inp').value = '';
            if(currentMsgTab === 'sent') renderMsgList();
        }

        /* ================= 5. COURSES (Search, Add, Edit, Delete) ================= */
        function renderCourses() {
            const user = state.currentUser;
            const searchVal = document.getElementById('course-search') ? document.getElementById('course-search').value.toLowerCase() : '';
            
            const myCourses = state.courses.filter(c => 
                (user.role === 'hod' || user.role === 'oa' || c.userId === user.id) &&
                (c.subject.toLowerCase().includes(searchVal) || c.syllabus.toLowerCase().includes(searchVal))
            );

            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">Courses Management</h2>
                <div class="card">
                    <div class="course-header-actions">
                        <input type="text" id="course-search" class="search-bar" placeholder="Search courses..." onkeyup="renderCourses()">
                        <button class="btn btn-primary" onclick="openCourseModal()"><i class="fas fa-plus"></i> Add Course</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Sr. No</th>
                                    <th>Subject Name</th>
                                    <th>Syllabus</th>
                                    <th>PDF</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${myCourses.map((c, idx) => `
                                    <tr>
                                        <td>${idx + 1}</td>
                                        <td><strong>${c.subject}</strong></td>
                                        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.syllabus}</td>
                                        <td>
                                            ${c.pdfUrl ? `<a href="#" style="color:var(--accent);"><i class="fas fa-file-pdf"></i> ${c.pdfUrl}</a>` : '<span style="color:#ccc;">No File</span>'}
                                        </td>
                                        <td>
                                            <span class="${c.pdfUrl ? 'status-saved' : 'status-pending'}">
                                                ${c.pdfUrl ? 'Saved' : 'Pending'}
                                            </span>
                                        </td>
                                        <td>
                                            <button class="btn btn-sm btn-primary" onclick="openCourseModal(${c.id})"><i class="fas fa-edit"></i></button>
                                            <button class="btn btn-sm btn-danger" onclick="deleteCourse(${c.id})"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function openCourseModal(id = null) {
            const modal = document.getElementById('course-modal');
            const title = document.getElementById('course-modal-title');
            const idInput = document.getElementById('course-id');
            const subInput = document.getElementById('course-subject');
            const sylInput = document.getElementById('course-syllabus');
            const pdfInput = document.getElementById('course-pdf');
            const currPdf = document.getElementById('current-pdf-name');

            if(id) {
                const c = state.courses.find(x => x.id === id);
                title.innerText = "Edit Course";
                idInput.value = c.id;
                subInput.value = c.subject;
                sylInput.value = c.syllabus;
                currPdf.innerText = c.pdfUrl ? `Current: ${c.pdfUrl}` : '';
                currPdf.style.display = c.pdfUrl ? 'block' : 'none';
            } else {
                title.innerText = "Add New Course";
                idInput.value = '';
                subInput.value = '';
                sylInput.value = '';
                pdfInput.value = '';
                currPdf.style.display = 'none';
            }
            modal.style.display = 'flex';
        }

        function saveCourse() {
            const id = document.getElementById('course-id').value;
            const subject = document.getElementById('course-subject').value;
            const syllabus = document.getElementById('course-syllabus').value;
            const pdfFile = document.getElementById('course-pdf').files[0];
            
            if(!subject || !syllabus) return showToast("Subject and Syllabus required");

            const pdfName = pdfFile ? pdfFile.name : (id ? state.courses.find(c=>c.id==id).pdfUrl : null);

            if(id) {
                // Edit
                const idx = state.courses.findIndex(c => c.id == id);
                if(idx > -1) {
                    state.courses[idx] = { ...state.courses[idx], subject, syllabus, pdfUrl: pdfName };
                }
            } else {
                // Add
                state.courses.push({
                    id: Date.now(),
                    userId: state.currentUser.id,
                    subject, syllabus, pdfUrl: pdfName
                });
            }
            saveState();
            closeModal('course-modal');
            showToast("Course Saved!");
            renderCourses();
        }

        function deleteCourse(id) {
            if(confirm("Delete this course?")) {
                state.courses = state.courses.filter(c => c.id !== id);
                saveState();
                renderCourses();
            }
        }

        /* ================= 6. PROFILE (Edit & Save) ================= */
        let isEditingProfile = false;
        function renderProfile() {
            const u = state.currentUser;
            const photoStyle = u.photo ? `background-image:url('${u.photo}'); background-size:cover;` : '';
            
            document.getElementById('content-area').innerHTML = `
                <h2 style="margin-bottom:20px;">My Profile</h2>
                <div class="card" style="max-width:600px; margin:0 auto; text-align:center;">
                    <div class="user-avatar" id="profile-avatar" style="width:120px; height:120px; margin:0 auto 20px; ${photoStyle}">
                        ${!u.photo ? '<i class="fas fa-user" style="font-size:3rem;"></i>' : ''}
                    </div>
                    
                    <!-- View Mode -->
                    <div id="p-view" style="${isEditingProfile ? 'display:none;' : ''}">
                        <div style="text-align:left; margin-bottom:15px;">
                            <label style="color:#777; font-size:0.8rem;">Name</label>
                            <div style="font-weight:bold; font-size:1.1rem;">${u.name}</div>
                        </div>
                        <div style="text-align:left; margin-bottom:15px;">
                            <label style="color:#777; font-size:0.8rem;">UID</label>
                            <div>${u.uid}</div>
                        </div>
                        <div style="text-align:left; margin-bottom:15px;">
                            <label style="color:#777; font-size:0.8rem;">Department</label>
                            <div>${u.dept}</div>
                        </div>
                         <div style="text-align:left; margin-bottom:15px;">
                            <label style="color:#777; font-size:0.8rem;">College</label>
                            <div>${u.college}</div>
                        </div>
                        <button class="btn btn-primary" onclick="toggleProfileEdit(true)">Edit Profile</button>
                    </div>

                    <!-- Edit Mode -->
                    <div id="p-edit" style="display:${isEditingProfile ? 'block;' : 'none'}; text-align:left;">
                        <div class="form-group">
                            <label>Profile Photo</label>
                            <input type="file" id="p-photo" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="p-name" value="${u.name}">
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" id="p-dept" value="${u.dept}">
                        </div>
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <button class="btn btn-success" onclick="saveProfile()">Save</button>
                            <button class="btn btn-danger" onclick="toggleProfileEdit(false)">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleProfileEdit(enable) {
            isEditingProfile = enable;
            renderProfile();
        }

        function saveProfile() {
            const name = document.getElementById('p-name').value;
            const dept = document.getElementById('p-dept').value;
            const photoInput = document.getElementById('p-photo');

            if(name) state.currentUser.name = name;
            if(dept) state.currentUser.dept = dept;

            // Handle Photo (simulated base64)
            if(photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    state.currentUser.photo = e.target.result;
                    updateSidebarAvatar(state.currentUser.photo);
                    finalizeProfileSave();
                };
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                finalizeProfileSave();
            }
        }

        function finalizeProfileSave() {
            // Update in main users array
            const idx = state.users.findIndex(u => u.id === state.currentUser.id);
            if(idx !== -1) state.users[idx] = state.currentUser;
            
            saveState();
            isEditingProfile = false;
            showToast("Profile Updated!");
            renderProfile();
            document.getElementById('user-name-display').innerText = state.currentUser.name;
        }

        /* ================= UTILS ================= */
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
